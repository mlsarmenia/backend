name: Deploy production

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mls-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy master to Cloudways
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://mlsapp.am

    steps:
      - name: Check out the deployed revision
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Deploy and verify
        env:
          CLOUDWAYS_DEPLOY_SSH_KEY: ${{ secrets.CLOUDWAYS_DEPLOY_SSH_KEY }}
          CLOUDWAYS_SSH_USER: ${{ vars.CLOUDWAYS_SSH_USER }}
          CLOUDWAYS_SSH_HOST: 46.101.228.150
          PRODUCTION_URL: https://mlsapp.am
        run: bash scripts/cloudways-deploy.sh
